<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OBS Fußball Overlay</title>

<style>

html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:transparent;
}

#container{
    position:relative;
    width:100%;
    height:100%;
}

#bg{
    width:100%;
    height:auto;
    display:block;
}

#time{
    position:absolute;

    left:2.5%;
    top:39%;

    width:11%;

    text-align:center;

    font-size:72px;
    font-family:Arial, sans-serif;
    font-weight:900;

    color:#000000;
}

#score{
    position:absolute;

    left:41%;
    top:38%;

    width:18%;

    text-align:center;

    font-size:82px;
    font-family:Arial, sans-serif;
    font-weight:900;

    color:#ffffff;

    text-shadow:
        -2px -2px 0 #000,
         2px -2px 0 #000,
        -2px  2px 0 #000,
         2px  2px 0 #000;
}

</style>
</head>

<body>

<div id="container">

    <img id="bg" src="overlay.png" alt="Overlay">

    <div id="time">0'</div>

    <div id="score">0 - 0</div>

</div>

<script src="script.js"></script>

</body>
</html>
