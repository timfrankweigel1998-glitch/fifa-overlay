<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FIFA Overlay</title>

<style>

body{
    margin:0;
    padding:0;
    background:transparent;
    overflow:hidden;
}

#wrap{
    position:relative;
    width:1536px;
    height:864px;
}

#bg{
    width:1536px;
    display:block;
}

/* ZEIT LINKS */
#time{
    position:absolute;
    left:50px;
    top:270px;

    width:180px;

    text-align:center;

    font-size:56px;
    font-family:Arial,sans-serif;
    font-weight:900;

    color:#000;
}

/* GER SCORE */
#home{
    position:absolute;
    left: 705px;
    top:400px;

    width:60px;

    text-align:center;

    font-size:58px;
    font-family:Arial,sans-serif;
    font-weight:900;

    color:white;

    text-shadow:
        -2px -2px 0 #000,
         2px -2px 0 #000,
        -2px  2px 0 #000,
         2px  2px 0 #000;
}

/* CIV SCORE */
#away{
    position:absolute;
    left:995px;
    top:490px;

    width:60px;

    text-align:center;

    font-size:58px;
    font-family:Arial,sans-serif;
    font-weight:900;

    color:white;

    text-shadow:
        -2px -2px 0 #000,
         2px -2px 0 #000,
        -2px  2px 0 #000,
         2px  2px 0 #000;
}

</style>
</head>

<body>

<div id="wrap">

    <img id="bg" src="overlay.png">

    <div id="time">00:00</div>

    <div id="home">0</div>

    <div id="away">0</div>

</div>

<script src="script.js"></script>

</body>
</html>
